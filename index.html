<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mensagens de Fé</title>

<style>

body{
font-family: Arial;
margin:0;
text-align:center;
background:linear-gradient(120deg,#5f9cff,#6a11cb);
color:white;
}

header{
padding:30px;
font-size:32px;
font-weight:bold;
}

.card{
background:white;
color:#333;
max-width:600px;
margin:40px auto;
padding:30px;
border-radius:20px;
font-size:22px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.botoes{
margin-top:20px;
}

button{
padding:12px 20px;
margin:5px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.nova{
background:#2575fc;
color:white;
}

.whatsapp{
background:#25D366;
color:white;
}

.curtir{
background:#ff4d6d;
color:white;
}

#likes{
margin-top:10px;
font-size:16px;
color:#555;
}

footer{
margin-top:40px;
padding:20px;
font-size:14px;
}

</style>
</head>

<body>

<header>
🙏 Mensagens de Fé
</header>

<div class="card">

<div id="mensagem"></div>

<div id="likes">❤️ 0 curtidas</div>

<div class="botoes">

<button class="nova" onclick="novaMensagem()">Nova mensagem</button>

<button class="whatsapp" onclick="compartilhar()">Compartilhar</button>

<button class="curtir" onclick="curtir()">Curtir</button>

</div>

</div>

<footer>
Espalhe fé e esperança todos os dias ✨
</footer>

<script>

let likes = 0;

const bomdia = [
"Bom dia! Que Deus abençoe seu dia.",
"Bom dia! Deus preparou algo lindo para hoje.",
"Bom dia! Comece o dia com fé."
];

const boatarde = [
"Boa tarde! Deus está cuidando de tudo.",
"Boa tarde! Grandes coisas estão por vir.",
"Boa tarde! Continue confiando em Deus."
];

const boanoite = [
"Boa noite! Deus está guardando seu descanso.",
"Boa noite! Entregue seus problemas a Deus.",
"Boa noite! Amanhã será um novo dia de vitória."
];

function mensagemHorario(){

let hora = new Date().getHours();
let lista;

if(hora < 12){
lista = bomdia;
}
else if(hora < 18){
lista = boatarde;
}
else{
lista = boanoite;
}

let numero = Math.floor(Math.random() * lista.length);

document.getElementById("mensagem").innerText = lista[numero];

}

function novaMensagem(){
mensagemHorario();
}

function compartilhar(){

let texto = document.getElementById("mensagem").innerText;

let url = "https://wa.me/?text=" + encodeURIComponent(texto);

window.open(url);

}

function curtir(){

likes++;

document.getElementById("likes").innerText = "❤️ " + likes + " curtidas";

}

mensagemHorario();

</script>

</body>
</html>
