<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mensagens de Fé</title>

<style>
body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#4facfe,#00f2fe);
margin:0;
padding:0;
text-align:center;
color:white;
}

header{
padding:40px;
font-size:32px;
font-weight:bold;
}

.container{
max-width:700px;
margin:auto;
padding:20px;
}

.mensagem{
background:rgba(255,255,255,0.15);
padding:20px;
margin:20px 0;
border-radius:15px;
font-size:20px;
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
background:white;
color:#333;
}

footer{
margin-top:40px;
padding:20px;
font-size:14px;
}
</style>
</head>

<body>

<header>
🙏 Mensagens de Fé
</header>

<div class="container">

<div class="mensagem" id="mensagem">
Deus nunca atrasa, Ele capricha no tempo certo.
</div>

<button onclick="novaMensagem()">Nova Mensagem</button>

</div>

<footer>
Que sua fé seja maior que seus medos ✨
</footer>

<script>

const mensagens = [
"Deus nunca falha, confie no processo.",
"A fé move montanhas.",
"Entregue seus planos a Deus.",
"Deus está preparando algo maior.",
"Ore, confie e espere.",
"A vitória vem para quem acredita.",
"Deus cuida de cada detalhe da sua vida."
];

function novaMensagem(){
let numero = Math.floor(Math.random() * mensagens.length);
document.getElementById("mensagem").innerText = mensagens[numero];
}

</script>

</body>
</html>
